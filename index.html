const STORAGE_KEY = "quantumqueen-module5-v2-a";

function App() {
  const [theme, setTheme] = useState("dark");
  const [active, setActive] = useState(0);
  const [done, setDone] = useState({});
  const [journals, setJournals] = useState({});
  const [auditEntries, setAuditEntries] = useState({});
  const [mobileNav, setMobileNav] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const [loaded, setLoaded] = useState(false);

  const C = theme === "dark" ? DARK : LIGHT;

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (s.theme) setTheme(s.theme);
        if (s.done) setDone(s.done);
        if (s.journals) setJournals(s.journals);
        if (s.auditEntries) setAuditEntries(s.auditEntries);
      }
    } catch (err) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ theme, done, journals, auditEntries }));
    } catch (err) {}
  }, [theme, done, journals, auditEntries, loaded]);

  const toggleTheme = () => setTheme(theme === "dark" ? "light" : "dark");
  const toggleDone = (i) => setDone({ ...done, [i]: !done[i] });

  const updateJournal = (fieldId, text) => {
    const existing = journals[fieldId] || {};
    setJournals({ ...journals, [fieldId]: { text, savedAt: existing.savedAt } });
  };

  const updateAudit = (domainId, key, text) => {
    const domainData = auditEntries[domainId] || {};
    setAuditEntries({ ...auditEntries, [domainId]: { ...domainData, [key]: text } });
  };

  const getAllFieldIds = (lesson) => {
    const ids = [];
    if (lesson.journals) lesson.journals.forEach(j => ids.push(j.id));
    if (lesson.parallelSelf) {
      lesson.parallelSelf.timelineFields.forEach(f => ids.push(f.id));
      ids.push(lesson.parallelSelf.letterField.id);
      ids.push(lesson.parallelSelf.closingField.id);
    }
    if (lesson.queenAudit) {
      ids.push(lesson.queenAudit.closingField.id);
    }
    if (lesson.queenStandards) {
      lesson.queenStandards.domains.forEach(d => d.fields.forEach(f => ids.push(f.id)));
    }
    if (lesson.coronation) {
      lesson.coronation.parts.forEach(p => ids.push(p.id));
      ids.push(lesson.coronation.signature.nameField.id);
      ids.push(lesson.coronation.signature.dateField.id);
      ids.push(lesson.coronation.signature.locationField.id);
      ids.push(lesson.coronation.closingField.id);
    }
    return ids;
  };

  const saveLessonJournals = () => {
    const lesson = MODULE_DATA.lessons[active];
    const ids = getAllFieldIds(lesson);
    const now = new Date().toISOString();
    const updated = { ...journals };
    ids.forEach(id => {
      if (updated[id]) updated[id] = { ...updated[id], savedAt: now };
    });
    setJournals(updated);
    setSaveStatus("✦ Saved");
    setTimeout(() => setSaveStatus(""), 2000);
  };

  const buildLessonContent = (lesson) => {
    let content = "";
    content += "Lesson " + lesson.id + ": " + lesson.title + "\n";
    content += "Duration: " + lesson.dur + "\n";
    content += "═══════════════════════════════════════════════════════\n\n";

    if (lesson.journals) {
      lesson.journals.forEach(j => {
        content += j.prompt + "\n\n";
        content += ((journals[j.id] && journals[j.id].text) || "(no entry)") + "\n\n";
        content += "───────────────────────────────────────────────────────\n\n";
      });
    }
    if (lesson.parallelSelf) {
      const ps = lesson.parallelSelf;
      content += "TIMELINE INFLECTION POINTS\n\n";
      ps.timelineFields.forEach(f => {
        content += f.prompt + "\n\n";
        content += ((journals[f.id] && journals[f.id].text) || "(no entry)") + "\n\n";
        content += "───────────────────────────────────────────────────────\n\n";
      });
      content += "THE LETTER FROM HER\n\n";
      content += ((journals[ps.letterField.id] && journals[ps.letterField.id].text) || "(no entry)") + "\n\n";
      content += "═══════════════════════════════════════════════════════\n\n";
      content += "THE DECISION\n\n";
      content += ((journals[ps.closingField.id] && journals[ps.closingField.id].text) || "(no entry)") + "\n\n";
    }
    if (lesson.queenAudit) {
      const qa = lesson.queenAudit;
      content += "THE QUEEN AUDIT — SIX DOMAINS\n\n";
      qa.domains.forEach(d => {
        content += d.number + " · " + d.title.toUpperCase() + "\n";
        content += d.framing + "\n\n";
        d.prompts.forEach(p => {
          const val = (auditEntries[d.id] && auditEntries[d.id][p.key]) || "(no entry)";
          content += p.label.toUpperCase() + ":\n" + val + "\n\n";
        });
        content += "───────────────────────────────────────────────────────\n\n";
      });
      content += "AUDIT CLOSING REFLECTION\n\n";
      content += ((journals[qa.closingField.id] && journals[qa.closingField.id].text) || "(no entry)") + "\n\n";
    }
    if (lesson.queenStandards) {
      const qs = lesson.queenStandards;
      content += "THE QUEEN STANDARDS DOCUMENT\n\n";
      qs.domains.forEach(d => {
        content += d.number + " · " + d.title.toUpperCase() + "\n";
        content += d.framing + "\n\n";
        d.fields.forEach(f => {
          content += f.prompt + "\n";
          content += ((journals[f.id] && journals[f.id].text) || "(no entry)") + "\n\n";
        });
        content += "───────────────────────────────────────────────────────\n\n";
      });
    }
    if (lesson.coronation) {
      const co = lesson.coronation;
      content += "★ THE CORONATION DECLARATION ★\n\n";
      co.parts.forEach(p => {
        content += p.number + " · " + p.title.toUpperCase() + "\n";
        content += p.opener + "\n";
        content += ((journals[p.id] && journals[p.id].text) || "(no entry)") + "\n\n";
        content += "───────────────────────────────────────────────────────\n\n";
      });
      content += "V · THE SIGNATURE\n\n";
      content += "Signed: " + ((journals[co.signature.nameField.id] && journals[co.signature.nameField.id].text) || "_______________________") + "\n";
      content += "Date:   " + ((journals[co.signature.dateField.id] && journals[co.signature.dateField.id].text) || "_______________________") + "\n";
      content += "Place:  " + ((journals[co.signature.locationField.id] && journals[co.signature.locationField.id].text) || "_______________________") + "\n\n";
      content += "═══════════════════════════════════════════════════════\n\n";
      content += "AFTER READING IT OUT LOUD\n\n";
      content += ((journals[co.closingField.id] && journals[co.closingField.id].text) || "(no entry)") + "\n\n";
    }
    return content;
  };

  const exportLesson = (lesson) => {
    let content = "QUANTUM QUEEN · MODULE 5 — THE CORONATION: BECOMING SOVEREIGN\n";
    content += "Exported " + new Date().toLocaleString() + "\n\n";
    content += buildLessonContent(lesson);
    content += "\n\nYou are the alchemy.\nBadass Alchemy · Baddie Society · Quantum Queen\n";
    downloadTxt(content, "quantum-queen-m5-lesson-" + lesson.id + "-" + lesson.title.toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".txt");
  };

  const exportAllJournals = () => {
    let content = "QUANTUM QUEEN · MODULE 5 — THE CORONATION: BECOMING SOVEREIGN\n";
    content += "Full module export · " + new Date().toLocaleString() + "\n";
    content += "═══════════════════════════════════════════════════════\n\n";
    MODULE_DATA.lessons.forEach(lesson => {
      content += "\n\n╔══════════════════════════════════════════════════════╗\n";
      content += "║ LESSON " + lesson.id + " · " + lesson.title.toUpperCase() + "\n";
      content += "╚══════════════════════════════════════════════════════╝\n\n";
      content += buildLessonContent(lesson);
    });
    content += "\n\nYou are the alchemy.\nBadass Alchemy · Baddie Society · Quantum Queen\n";
    downloadTxt(content, "quantum-queen-m5-all-journals-" + new Date().toISOString().slice(0,10) + ".txt");
  };

  const downloadTxt = (content, filename) => {
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const progress = Math.round((Object.values(done).filter(Boolean).length / MODULE_DATA.lessons.length) * 100);

              Badass Alchemy · Baddie Society

                      <button onClick={() => setActive(active - 1)} style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.5, color: C.txt, background: "transparent", padding: "14px 28px", borderRadius: 50, border: "1px solid " + C.borderMid, cursor: "pointer", textTransform: "uppercase" }}>← Previous</button>
                    ) : <span />}
                    {active < MODULE_DATA.lessons.length - 1 ? (
                      <button onClick={() => setActive(active + 1)} style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.5, color: "#FFFFFF", background: BRAND_GRAD, padding: "14px 28px", borderRadius: 50, border: "none", cursor: "pointer", textTransform: "uppercase" }}>Next Lesson →</button>
                    ) : <span />}
                  </div>

                  <div style={{ marginTop: 56, paddingTop: 32, borderTop: "1px solid " + C.border, textAlign: "center" }}>
                    <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontSize: 20, color: C.accent, marginBottom: 8 }}>You are the alchemy.</div>
                    <div style={{ fontSize: 9, fontWeight: 700, color: C.txtFaded, letterSpacing: 2, textTransform: "uppercase" }}>Badass Alchemy · Baddie Society · Quantum Queen</div>
                  </div>

                </div>
              );
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ icon, label, color, status }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
      <span style={{ fontSize: 16, color: color }}>{icon}</span>
      <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2.5, color: color, textTransform: "uppercase" }}>{label}</span>
      {status && <span style={{ marginLeft: "auto", fontSize: 9, fontWeight: 700, letterSpacing: 1, color: color }}>{status}</span>}
    </div>
  );
}

function SaveExportButtons({ onSave, onExport, C, saveLabel, theme }) {
  return (
    <div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 8 }}>
        <button onClick={onSave} style={{ flex: 1, minWidth: 160, fontSize: 11, fontWeight: 700, letterSpacing: 1.5, color: "#FFFFFF", background: "linear-gradient(135deg," + C.accent + "," + C.darkMid + ")", padding: "14px 22px", borderRadius: 50, border: "none", cursor: "pointer", textTransform: "uppercase" }}>{saveLabel}</button>
        <button onClick={onExport} style={{ flex: 1, minWidth: 160, fontSize: 11, fontWeight: 700, letterSpacing: 1.5, color: C.txt, background: "transparent", padding: "13px 22px", borderRadius: 50, border: "1px solid " + C.borderMid, cursor: "pointer", textTransform: "uppercase" }}>⬇ Download .txt</button>
      </div>
      <div style={{ fontSize: 11, color: C.txtMuted, lineHeight: 1.6, marginTop: 12 }}>
        Your entries save to this browser. Download the .txt to upload to Google Drive, Notion, or anywhere you keep your reflections.
      </div>
    </div>
  );
}

// Mount
document.getElementById('loading').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
